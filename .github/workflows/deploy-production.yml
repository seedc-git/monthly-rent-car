name: Deploy production to Xserver

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public files
        run: |
          mkdir _site
          cp index.html line.html styles.css script.js _site/
          cp -R assets shop _site/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.XSERVER_FTP_SERVER }}
          username: ${{ secrets.XSERVER_FTP_USERNAME }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          server-dir: ${{ secrets.XSERVER_FTP_SERVER_DIR }}
          local-dir: ./_site/
